# An example boomfile.toml — a runnable reference for the resource types and phase order.
# Copy the pieces you need into your own dotfiles repo; `boom doctor --config` checks it.

# A top-level [boom] table folds boom's own self-wiring into the reconcile it already runs:
# keep the Claude skill fresh, nudge on a new release, and manage scheduled boom timers
# (macOS) — instead of hand-rolling those as run/plist steps.
[boom]
skill_on_sync = true             # regenerate ~/.claude/skills/boom/SKILL.md each sync
upgrade_on_sync = "check"        # warn when a newer boom release ships ("auto" self-upgrades)
# schedule: a launchd timer per entry (macOS-only) running `boom <cmd>` on `every`.
schedule = [
  { cmd = "verify", every = "15m" },      # catch drift every 15m
  { cmd = "code fetch", every = "15m" },   # keep every `boom code` repo's origin warm
]

[[section]]
name = "Shell + git"

[[section.link]]
src = ".zshrc"
dst = "~/.zshrc"

[[section.link]]
src = ".zprofile"
dst = "~/.zprofile"

[[section.link]]
src = ".zshenv"
dst = "~/.zshenv"

[[section.link]]
src = ".gitconfig"
dst = "~/.gitconfig"

[[section.link]]
src = ".gitignore"
dst = "~/.gitignore"

[[section.link]]
src = ".editorconfig"
dst = "~/.editorconfig"

[[section.link]]
src = "git-template/hooks/pre-commit"
dst = "~/.config/git/template/hooks/pre-commit"

[[section]]
name = "SSH"

[[section.link]]
src = "ssh/config"
dst = "~/.ssh/config"
mode = "600"

[[section.link]]
src = "ssh/1password-agent.toml"
dst = "~/.config/1Password/ssh/agent.toml"

[[section]]
name = "Per-machine git identity"

# `copy` with `expand` renders the file before writing: ${env:VAR}/${host}/${os} are
# substituted, so one repo file yields per-machine content without a hook. (link can't
# expand — a symlink has no content of its own.)
[[section.copy]]
src = "gitconfig-local.tmpl"
dst = "~/.config/git/local"
expand = true

[[section]]
name = "Tools"

[[section.link]]
src = "mise.toml"
dst = "~/.config/mise/config.toml"

[[section.link]]
src = "starship.toml"
dst = "~/.config/starship.toml"

[[section.link]]
src = "ghostty/config"
dst = "~/.config/ghostty/config"

[[section.link]]
src = "nvim/init.lua"
dst = "~/.config/nvim/init.lua"

[[section]]
name = "Claude"

[[section.link]]
src = "dot-claude/CLAUDE.md"
dst = "~/.claude/CLAUDE.md"

[[section.link]]
src = "dot-claude/settings.json"
dst = "~/.claude/settings.json"

[[section]]
name = "Packages + zsh fragments"

# `pkg`: one array entry per manager. `brew` runs `brew bundle` over `file` (default
# "Brewfile"); `mise` runs `mise install` against the repo's mise config.
pkg = [
  { manager = "brew", file = "Brewfile" },
  { manager = "mise" },
]

# A glob `src` places every match under `dst` (a directory), preserving structure below the
# pattern's static prefix — the old `glob`, now just a `link` whose src has a wildcard.
[[section.link]]
src = "zsh/[0-9]*.zsh"
dst = "~/.config/zsh/"

[[section]]
name = "SSH perms"

# `dir` ensures a standalone directory exists with a mode — the declarative form of the
# mkdir -p/chmod run steps this used to be. `remove_on_uninstall = true` would remove it on
# uninstall (only if empty); omitted here since ~/.ssh holds user data.
[[section.dir]]
path = "~/.ssh"
mode = "700"

[[section.dir]]
path = "~/.ssh/cm"
mode = "700"

[[section]]
name = "Guardrails"

# `check` asserts file content on verify: every `present` regex must match, every `absent`
# must not — folded into `boom verify`'s exit code and JSON report. With `repair`, sync also
# *converges* the assertion (running the command only when it currently fails).
[[section.check]]
path = "~/.gitconfig"
present = ["\\[user\\]"]
message = "git identity not configured"

[[section]]
name = "LaunchAgents"
when = { os = "darwin" }

# `launchd` links a plist into ~/Library/LaunchAgents and owns its launchctl lifecycle
# (load -w on sync, unload on uninstall) — no copy-pasted `launchctl unload; load -w` dance.
[[section.launchd]]
src = "launchd/com.example.agent.plist"

[[section]]
name = "lefthook"

# `run.on` accepts a list, so a step firing on more than one verb is one entry.
[[section.run]]
on = "sync"
cmd = "lefthook install"

[[section]]
name = "op-agent"

[[section.link]]
src = "hooks/op-agent.sh"
dst = "~/.local/bin/op-agent"

[[section.run]]
on = "sync"
cmd = "op-agent provision"

[[section.run]]
on = "verify"
cmd = "op-agent status"
